services:
  - type: web
    name: pmublonab-staging-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/races
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: staging
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pmub_staging
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PASSCODE
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_TIMEOUT_SECONDS
        value: "180"
      - key: CORS_ORIGINS
        value: https://pmublonab-staging-web.onrender.com,https://pmublonab-staging-admin.onrender.com,http://localhost:8081,http://localhost:5173

  - type: web
    name: pmublonab-staging-web
    runtime: static
    buildCommand: cd frontend && corepack enable && yarn install --frozen-lockfile && yarn expo export --platform web
    staticPublishPath: ./frontend/dist
    autoDeployTrigger: checksPass
    envVars:
      - key: EXPO_PUBLIC_BACKEND_URL
        value: https://pmublonab-staging-api.onrender.com
      - key: EXPO_PUBLIC_APP_ENV
        value: staging
      - key: EXPO_PUBLIC_EAS_PROJECT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: pmublonab-staging-admin
    runtime: static
    buildCommand: cd admin-web && npm ci && npm run build
    staticPublishPath: ./admin-web/dist
    autoDeployTrigger: checksPass
    envVars:
      - key: VITE_API_URL
        value: https://pmublonab-staging-api.onrender.com
      - key: VITE_BASE
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
